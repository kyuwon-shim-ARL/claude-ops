<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude-CTB Dashboard</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-dot { 0%,100%{opacity:.4} 50%{opacity:1} }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

    /* Fresh completion glow — bright amber pulse */
    @keyframes fresh-glow {
      0%,100% { box-shadow: 0 0 12px 3px rgba(251,191,36,0.25), inset 0 0 8px rgba(251,191,36,0.05); }
      50%     { box-shadow: 0 0 28px 8px rgba(251,191,36,0.5), inset 0 0 12px rgba(251,191,36,0.1); }
    }
    .card-fresh {
      animation: fresh-glow 2s ease-in-out infinite;
      border-color: rgba(251,191,36,0.5) !important;
    }
    @media (prefers-reduced-motion: reduce) { .card-fresh { animation: none; } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-semibold tracking-tight">Claude-CTB Dashboard</h1>
      <span id="badge-count" class="bg-gray-800 text-xs px-2 py-0.5 rounded-full">0 sessions</span>
      <button id="btn-copy-names" class="hidden bg-gray-800 hover:bg-gray-700 text-xs px-2.5 py-0.5 rounded-full transition-colors cursor-pointer" title="Copy session names to clipboard">📋 Copy Names</button>
    </div>
    <div class="flex items-center gap-2 text-xs text-gray-500">
      <span id="conn-status" class="flex items-center gap-1">
        <span id="conn-dot" class="inline-block w-2 h-2 rounded-full bg-gray-600"></span>
        Connecting…
      </span>
      <span id="last-update" class="hidden">Updated <time></time></span>
    </div>
  </header>

  <!-- Session Grid -->
  <main id="grid" class="p-4 grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    <div class="col-span-full text-center text-gray-600 py-20 text-sm" id="empty-state">
      No sessions detected. Start a Claude session to see it here.
    </div>
  </main>

  <script>
    // --- Pin storage helpers ---
    const PIN_KEY = 'ctb_pinned_sessions';
    function getPinned() {
      try { return new Set(JSON.parse(localStorage.getItem(PIN_KEY) || '[]')); }
      catch { return new Set(); }
    }
    function savePinned(s) { localStorage.setItem(PIN_KEY, JSON.stringify([...s])); }
    function togglePin(name) {
      const p = getPinned();
      p.has(name) ? p.delete(name) : p.add(name);
      savePinned(p);
    }

    // --- State color map ---
    const STATE_CONFIG = {
      working:       { color: 'emerald', label: 'Working',       dot: 'bg-emerald-400 pulse-dot', border: 'border-emerald-500/30', bg: 'bg-emerald-500/5' },
      waiting:       { color: 'amber',   label: 'Waiting Input', dot: 'bg-amber-400 pulse-dot',   border: 'border-amber-500/30',   bg: 'bg-amber-500/5'   },
      idle:          { color: 'gray',    label: 'Idle',          dot: 'bg-gray-500',               border: 'border-gray-700',       bg: 'bg-gray-500/5'    },
      error:         { color: 'red',     label: 'Error',         dot: 'bg-red-400 pulse-dot',      border: 'border-red-500/30',     bg: 'bg-red-500/5'     },
      context_limit: { color: 'rose',    label: 'Context Limit', dot: 'bg-rose-400 pulse-dot',     border: 'border-rose-500/30',    bg: 'bg-rose-500/5'    },
      unknown:       { color: 'slate',   label: 'Unknown',       dot: 'bg-slate-500',              border: 'border-slate-700',      bg: 'bg-slate-500/5'   },
    };

    const grid = document.getElementById('grid');
    const emptyState = document.getElementById('empty-state');
    const badgeCount = document.getElementById('badge-count');
    const btnCopyNames = document.getElementById('btn-copy-names');
    const connDot = document.getElementById('conn-dot');
    const connStatus = document.getElementById('conn-status');
    const lastUpdateEl = document.getElementById('last-update');

    let sortedSessionNames = [];

    function formatAge(ts) {
      if (!ts || ts === 0) return '—';
      const diff = Math.floor(Date.now() / 1000 - ts);
      if (diff < 0) return 'just now';
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function shortName(name) {
      // claude_my-project → my-project
      return name.replace(/^claude[_-]/, '');
    }

    function shortPath(p) {
      if (!p) return '';
      const home = '/home/';
      const idx = p.indexOf(home);
      return idx >= 0 ? '~/' + p.slice(p.indexOf('/', idx + home.length) + 1) : p;
    }

    const FRESH_TTL = 300; // 5 minutes
    const STALE_FLOOR = 0.4;    // minimum opacity for stale idle sessions
    const STALE_DURATION = 3600; // 1 hour to reach floor

    function getStaleOpacity(session, fresh) {
      // Only fade idle sessions that are past their fresh window
      if (fresh) return 1;
      if (session.state !== 'idle') return 1;
      if (!session.updated_at) return 1;
      const age = Date.now() / 1000 - session.updated_at;
      if (age <= 0) return 1;
      if (age >= STALE_DURATION) return STALE_FLOOR;
      return 1 - (1 - STALE_FLOOR) * (age / STALE_DURATION);
    }

    function getFreshInfo(session) {
      // Fresh completion: only show when idle/waiting (not while working again)
      if (!session.completed_at) return null;
      if (session.state !== 'idle' && session.state !== 'waiting') return null;
      const age = Date.now() / 1000 - session.completed_at;
      if (age < 0 || age >= FRESH_TTL) return null;
      const remaining = FRESH_TTL - age;
      const pct = (remaining / FRESH_TTL) * 100;
      const mins = Math.floor(age / 60);
      const secs = Math.floor(age % 60);
      const label = mins > 0 ? `완료 ${mins}분 ${secs}초 전` : `완료 ${secs}초 전`;
      return { pct, label };
    }

    function getWorkBar(session) {
      const info = session.work_info;
      if (!info || info.total == null || info.total === 0) return null;
      const completed = info.completed || 0;
      const total = info.total;
      const pct = Math.round((completed / total) * 100);
      const color = pct >= 70 ? 'bg-emerald-400'
                  : pct >= 30 ? 'bg-amber-400'
                  :             'bg-red-400';
      const textColor = pct >= 70 ? 'text-emerald-400'
                      : pct >= 30 ? 'text-amber-400'
                      :             'text-red-400';
      return { pct, color, textColor, completed, total };
    }

    function renderCard(session, isPinned) {
      const cfg = STATE_CONFIG[session.state] || STATE_CONFIG.unknown;
      const name = escapeHtml(session.name);
      const display = escapeHtml(shortName(session.name));
      const pathStr = session.path ? escapeHtml(shortPath(session.path)) : '';
      const fresh = getFreshInfo(session);
      const wb = getWorkBar(session);
      const opacity = getStaleOpacity(session, fresh);

      const freshClass = fresh ? ' card-fresh' : '';
      const staleStyle = opacity < 1 ? ` style="opacity:${opacity.toFixed(2)}"` : '';
      const freshBar = fresh
        ? `<div class="absolute top-0 left-0 h-1 bg-amber-400 rounded-t-lg transition-all duration-1000" style="width:${fresh.pct.toFixed(1)}%"></div>`
        : '';
      const freshBadge = fresh
        ? `<span class="text-[0.6rem] font-bold text-gray-900 bg-amber-400 px-1.5 py-0.5 rounded-full ml-1.5 whitespace-nowrap" role="status">NEW</span>`
        : '';
      const updatedText = fresh
        ? `<span class="text-amber-400 font-medium">${fresh.label}</span>`
        : `<span>Updated: ${formatAge(session.updated_at)}</span>`;
      const workText = wb
        ? `<span class="${wb.textColor} font-medium">${wb.completed}/${wb.total} tasks</span>`
        : '';
      const workBar = wb
        ? `<div class="absolute bottom-0 left-0 h-[3px] ${wb.color} rounded-b-lg transition-all duration-700 opacity-70" style="width:${wb.pct}%"></div>`
        : '';

      const pinIcon = isPinned ? '★' : '☆';
      const pinClass = isPinned
        ? 'text-amber-400 opacity-100'
        : 'text-gray-600 opacity-40 hover:opacity-80';

      return `
        <div class="group relative overflow-hidden rounded-lg border ${cfg.border} ${cfg.bg} pl-10 pr-4 pt-4 pb-4 flex flex-col gap-2 transition-all duration-300${freshClass}"${staleStyle}>
          ${freshBar}
          ${workBar}
          <button data-pin-session="${name}" class="${pinClass} absolute top-2 left-2 min-w-[44px] min-h-[44px] flex items-center justify-center text-lg leading-none cursor-pointer transition-opacity" style="touch-action:manipulation" title="${isPinned ? 'Unpin session' : 'Pin session'}">${pinIcon}</button>
          <div class="flex items-center justify-between">
            <span class="font-mono text-sm font-medium truncate" title="${name}">${display}</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-400">
              <span class="inline-block w-2 h-2 rounded-full ${cfg.dot}"></span>
              ${cfg.label}${freshBadge}
              <button data-copy-cmd="/sessions ${name}" class="ml-1 opacity-60 sm:opacity-0 sm:group-hover:opacity-100 min-w-[44px] min-h-[44px] flex items-center justify-center text-gray-600 hover:text-gray-300 transition-opacity cursor-pointer select-none" style="touch-action:manipulation" title="Copy Telegram command" aria-label="Copy /sessions command for ${display}">⎘</button>
            </span>
          </div>
          ${pathStr ? `<div class="text-xs text-gray-600 font-mono truncate" title="${escapeHtml(session.path || '')}">${pathStr}</div>` : ''}
          <div class="flex items-center justify-between text-xs text-gray-500">
            ${updatedText}
            ${workText}
          </div>
        </div>
      `;
    }

    function render(data) {
      const sessions = data.sessions || [];
      badgeCount.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;

      if (sessions.length === 0) {
        emptyState.classList.remove('hidden');
        btnCopyNames.classList.add('hidden');
        sortedSessionNames = [];
        // Remove all cards but keep empty state
        Array.from(grid.children).forEach(el => {
          if (el !== emptyState) el.remove();
        });
        return;
      }

      emptyState.classList.add('hidden');

      // Pin tier sort
      const pinned = getPinned();
      // Prune stale pins (only keep pins for active sessions)
      const activeNames = new Set(sessions.map(s => s.name));
      const prunedPins = new Set([...pinned].filter(n => activeNames.has(n)));
      if (prunedPins.size !== pinned.size) savePinned(prunedPins);

      // Sort: pinned first, then state priority, then most recently updated
      const order = { working: 0, waiting: 1, context_limit: 2, error: 3, idle: 4, unknown: 5 };
      sessions.sort((a, b) => {
        const tierDiff = (prunedPins.has(a.name) ? 0 : 1) - (prunedPins.has(b.name) ? 0 : 1);
        if (tierDiff !== 0) return tierDiff;
        const stateDiff = (order[a.state] ?? 9) - (order[b.state] ?? 9);
        if (stateDiff !== 0) return stateDiff;
        return (b.updated_at || 0) - (a.updated_at || 0);
      });

      // Store sorted names for copy button
      sortedSessionNames = sessions.map(s => s.name);
      btnCopyNames.classList.remove('hidden');

      // Split into pinned and normal groups
      const pinnedSessions = sessions.filter(s => prunedPins.has(s.name));
      const normalSessions = sessions.filter(s => !prunedPins.has(s.name));
      const hasBothGroups = pinnedSessions.length > 0 && normalSessions.length > 0;

      // Build HTML with optional section dividers
      let html = '';
      if (pinnedSessions.length > 0) {
        html += '<div class="col-span-full flex items-center gap-2 text-xs text-amber-400 mt-1"><span>★ Pinned</span><div class="flex-1 border-t border-amber-400/20"></div></div>';
        html += pinnedSessions.map(s => renderCard(s, true)).join('');
      }
      if (hasBothGroups) {
        html += '<div class="col-span-full flex items-center gap-2 text-xs text-gray-500 mt-1"><span>Others</span><div class="flex-1 border-t border-gray-700"></div></div>';
      }
      if (normalSessions.length > 0) {
        html += normalSessions.map(s => renderCard(s, false)).join('');
      }

      // Remove old cards
      Array.from(grid.children).forEach(el => {
        if (el !== emptyState) el.remove();
      });
      grid.insertAdjacentHTML('afterbegin', html);

      // Update timestamp
      if (data.updated_at) {
        lastUpdateEl.classList.remove('hidden');
        lastUpdateEl.querySelector('time').textContent = formatAge(data.updated_at);
      }
    }

    // --- Pin button event delegation ---
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-pin-session]');
      if (!btn) return;
      e.stopPropagation();
      togglePin(btn.dataset.pinSession);
      if (lastData) render(lastData);
    });

    // --- SSE Connection ---
    let evtSource = null;
    let reconnectTimer = null;

    function setConnected(ok) {
      connDot.className = `inline-block w-2 h-2 rounded-full ${ok ? 'bg-emerald-400' : 'bg-red-400'}`;
      connStatus.lastChild.textContent = ok ? ' Connected' : ' Disconnected';
    }

    function connect() {
      if (evtSource) evtSource.close();

      // Initial fetch for immediate render
      fetch('/api/sessions')
        .then(r => r.json())
        .then(render)
        .catch(() => {});

      evtSource = new EventSource('/api/sessions/stream');

      evtSource.addEventListener('sessions', (e) => {
        try {
          const data = JSON.parse(e.data);
          render(data);
        } catch (err) {
          console.error('Failed to parse SSE data:', err);
        }
      });

      evtSource.onopen = () => {
        setConnected(true);
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      evtSource.onerror = () => {
        setConnected(false);
        evtSource.close();
        // Reconnect with backoff
        reconnectTimer = setTimeout(connect, 3000);
      };
    }

    // --- Auto-refresh age labels ---
    // Fast refresh (10s) when fresh sessions exist, normal (30s) otherwise
    let lastData = null;
    function refreshRender() {
      if (lastData) render(lastData);
    }
    const origRender = render;
    render = function(data) {
      lastData = data;
      origRender(data);
    };
    // Re-render cached data every 10s to update fresh countdowns
    setInterval(refreshRender, 10000);
    // Full API refresh every 30s
    setInterval(() => {
      fetch('/api/sessions')
        .then(r => r.json())
        .then(render)
        .catch(() => {});
    }, 30000);

    // --- Clipboard helper (HTTP/Tailscale safe) ---
    function _execCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
    }
    function copyToClipboard(text, onSuccess) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onSuccess).catch(() => { _execCopy(text); onSuccess(); });
      } else {
        _execCopy(text);
        onSuccess();
      }
    }

    // --- Copy session names ---
    btnCopyNames.addEventListener('click', () => {
      const text = sortedSessionNames.join('\n');
      copyToClipboard(text, () => {
        const orig = btnCopyNames.textContent;
        btnCopyNames.textContent = '✅ Copied!';
        setTimeout(() => { btnCopyNames.textContent = orig; }, 1500);
      });
    });

    // --- Copy command event delegation ---
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-copy-cmd]');
      if (!btn) return;
      e.stopPropagation();
      const cmd = btn.dataset.copyCmd;
      copyToClipboard(cmd, () => {
        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('text-emerald-400');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('text-emerald-400');
        }, 1500);
      });
    });

    // Start
    connect();

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
