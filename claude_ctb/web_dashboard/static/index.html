<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude-CTB Dashboard</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-dot { 0%,100%{opacity:.4} 50%{opacity:1} }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

    /* Fresh completion glow — bright amber pulse */
    @keyframes fresh-glow {
      0%,100% { box-shadow: 0 0 12px 3px rgba(251,191,36,0.25), inset 0 0 8px rgba(251,191,36,0.05); }
      50%     { box-shadow: 0 0 28px 8px rgba(251,191,36,0.5), inset 0 0 12px rgba(251,191,36,0.1); }
    }
    .card-fresh {
      animation: fresh-glow 2s ease-in-out infinite;
      border-color: rgba(251,191,36,0.5) !important;
    }
    @media (prefers-reduced-motion: reduce) { .card-fresh { animation: none; } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-semibold tracking-tight">Claude-CTB Dashboard</h1>
      <span id="badge-count" class="bg-gray-800 text-xs px-2 py-0.5 rounded-full">0 sessions</span>
      <button id="btn-copy-names" class="hidden bg-gray-800 hover:bg-gray-700 text-xs px-2.5 py-0.5 rounded-full transition-colors cursor-pointer" title="Copy session names to clipboard">📋 Copy Names</button>
    </div>
    <div class="flex items-center gap-2 text-xs text-gray-500">
      <span id="conn-status" class="flex items-center gap-1">
        <span id="conn-dot" class="inline-block w-2 h-2 rounded-full bg-gray-600"></span>
        Connecting…
      </span>
      <span id="last-update" class="hidden">Updated <time></time></span>
    </div>
  </header>

  <!-- Session Grid -->
  <main id="grid" class="p-4 grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    <div class="col-span-full text-center text-gray-600 py-20 text-sm" id="empty-state">
      No sessions detected. Start a Claude session to see it here.
    </div>
  </main>

  <script>
    // --- State color map ---
    const STATE_CONFIG = {
      working:       { color: 'emerald', label: 'Working',       dot: 'bg-emerald-400 pulse-dot', border: 'border-emerald-500/30', bg: 'bg-emerald-500/5' },
      waiting:       { color: 'amber',   label: 'Waiting Input', dot: 'bg-amber-400 pulse-dot',   border: 'border-amber-500/30',   bg: 'bg-amber-500/5'   },
      idle:          { color: 'gray',    label: 'Idle',          dot: 'bg-gray-500',               border: 'border-gray-700',       bg: 'bg-gray-500/5'    },
      error:         { color: 'red',     label: 'Error',         dot: 'bg-red-400 pulse-dot',      border: 'border-red-500/30',     bg: 'bg-red-500/5'     },
      context_limit: { color: 'rose',    label: 'Context Limit', dot: 'bg-rose-400 pulse-dot',     border: 'border-rose-500/30',    bg: 'bg-rose-500/5'    },
      unknown:       { color: 'slate',   label: 'Unknown',       dot: 'bg-slate-500',              border: 'border-slate-700',      bg: 'bg-slate-500/5'   },
    };

    const grid = document.getElementById('grid');
    const emptyState = document.getElementById('empty-state');
    const badgeCount = document.getElementById('badge-count');
    const btnCopyNames = document.getElementById('btn-copy-names');
    const connDot = document.getElementById('conn-dot');
    const connStatus = document.getElementById('conn-status');
    const lastUpdateEl = document.getElementById('last-update');

    let sortedSessionNames = [];

    function formatAge(ts) {
      if (!ts || ts === 0) return '—';
      const diff = Math.floor(Date.now() / 1000 - ts);
      if (diff < 0) return 'just now';
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function shortName(name) {
      // claude_my-project → my-project
      return name.replace(/^claude[_-]/, '');
    }

    function shortPath(p) {
      if (!p) return '';
      const home = '/home/';
      const idx = p.indexOf(home);
      return idx >= 0 ? '~/' + p.slice(p.indexOf('/', idx + home.length) + 1) : p;
    }

    const FRESH_TTL = 300; // 5 minutes

    function getFreshInfo(session) {
      // Fresh completion: only show when idle/waiting (not while working again)
      if (!session.completed_at) return null;
      if (session.state !== 'idle' && session.state !== 'waiting') return null;
      const age = Date.now() / 1000 - session.completed_at;
      if (age < 0 || age >= FRESH_TTL) return null;
      const remaining = FRESH_TTL - age;
      const pct = (remaining / FRESH_TTL) * 100;
      const mins = Math.floor(age / 60);
      const secs = Math.floor(age % 60);
      const label = mins > 0 ? `완료 ${mins}분 ${secs}초 전` : `완료 ${secs}초 전`;
      return { pct, label };
    }

    function renderCard(session) {
      const cfg = STATE_CONFIG[session.state] || STATE_CONFIG.unknown;
      const name = escapeHtml(session.name);
      const display = escapeHtml(shortName(session.name));
      const pathStr = session.path ? escapeHtml(shortPath(session.path)) : '';
      const fresh = getFreshInfo(session);

      const freshClass = fresh ? ' card-fresh' : '';
      const freshBar = fresh
        ? `<div class="absolute top-0 left-0 h-1 bg-amber-400 rounded-t-lg transition-all duration-1000" style="width:${fresh.pct.toFixed(1)}%"></div>`
        : '';
      const freshBadge = fresh
        ? `<span class="text-[0.6rem] font-bold text-gray-900 bg-amber-400 px-1.5 py-0.5 rounded-full ml-1.5 whitespace-nowrap" role="status">NEW</span>`
        : '';
      const updatedText = fresh
        ? `<span class="text-amber-400 font-medium">${fresh.label}</span>`
        : `<span>Updated: ${formatAge(session.updated_at)}</span>`;

      return `
        <div class="relative overflow-hidden rounded-lg border ${cfg.border} ${cfg.bg} p-4 flex flex-col gap-2 transition-all duration-300${freshClass}">
          ${freshBar}
          <div class="flex items-center justify-between">
            <span class="font-mono text-sm font-medium truncate" title="${name}">${display}</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-400">
              <span class="inline-block w-2 h-2 rounded-full ${cfg.dot}"></span>
              ${cfg.label}${freshBadge}
            </span>
          </div>
          ${pathStr ? `<div class="text-xs text-gray-600 font-mono truncate" title="${escapeHtml(session.path || '')}">${pathStr}</div>` : ''}
          <div class="flex items-center justify-between text-xs text-gray-500">
            ${updatedText}
          </div>
        </div>
      `;
    }

    function render(data) {
      const sessions = data.sessions || [];
      badgeCount.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;

      if (sessions.length === 0) {
        emptyState.classList.remove('hidden');
        btnCopyNames.classList.add('hidden');
        sortedSessionNames = [];
        // Remove all cards but keep empty state
        Array.from(grid.children).forEach(el => {
          if (el !== emptyState) el.remove();
        });
        return;
      }

      emptyState.classList.add('hidden');

      // Sort: state priority first, then most recently updated within each state
      const order = { working: 0, waiting: 1, context_limit: 2, error: 3, idle: 4, unknown: 5 };
      sessions.sort((a, b) => {
        const stateDiff = (order[a.state] ?? 9) - (order[b.state] ?? 9);
        if (stateDiff !== 0) return stateDiff;
        // Within same state: most recently updated first
        return (b.updated_at || 0) - (a.updated_at || 0);
      });

      // Store sorted names for copy button
      sortedSessionNames = sessions.map(s => s.name);
      btnCopyNames.classList.remove('hidden');

      // Replace grid content (keep empty state node)
      const cards = sessions.map(renderCard).join('');
      // Remove old cards
      Array.from(grid.children).forEach(el => {
        if (el !== emptyState) el.remove();
      });
      grid.insertAdjacentHTML('afterbegin', cards);

      // Update timestamp
      if (data.updated_at) {
        lastUpdateEl.classList.remove('hidden');
        lastUpdateEl.querySelector('time').textContent = formatAge(data.updated_at);
      }
    }

    // --- SSE Connection ---
    let evtSource = null;
    let reconnectTimer = null;

    function setConnected(ok) {
      connDot.className = `inline-block w-2 h-2 rounded-full ${ok ? 'bg-emerald-400' : 'bg-red-400'}`;
      connStatus.lastChild.textContent = ok ? ' Connected' : ' Disconnected';
    }

    function connect() {
      if (evtSource) evtSource.close();

      // Initial fetch for immediate render
      fetch('/api/sessions')
        .then(r => r.json())
        .then(render)
        .catch(() => {});

      evtSource = new EventSource('/api/sessions/stream');

      evtSource.addEventListener('sessions', (e) => {
        try {
          const data = JSON.parse(e.data);
          render(data);
        } catch (err) {
          console.error('Failed to parse SSE data:', err);
        }
      });

      evtSource.onopen = () => {
        setConnected(true);
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      evtSource.onerror = () => {
        setConnected(false);
        evtSource.close();
        // Reconnect with backoff
        reconnectTimer = setTimeout(connect, 3000);
      };
    }

    // --- Auto-refresh age labels ---
    // Fast refresh (10s) when fresh sessions exist, normal (30s) otherwise
    let lastData = null;
    function refreshRender() {
      if (lastData) render(lastData);
    }
    const origRender = render;
    render = function(data) {
      lastData = data;
      origRender(data);
    };
    // Re-render cached data every 10s to update fresh countdowns
    setInterval(refreshRender, 10000);
    // Full API refresh every 30s
    setInterval(() => {
      fetch('/api/sessions')
        .then(r => r.json())
        .then(render)
        .catch(() => {});
    }, 30000);

    // --- Copy session names ---
    btnCopyNames.addEventListener('click', () => {
      const text = sortedSessionNames.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        const orig = btnCopyNames.textContent;
        btnCopyNames.textContent = '✅ Copied!';
        setTimeout(() => { btnCopyNames.textContent = orig; }, 1500);
      }).catch(() => {
        // Fallback for non-HTTPS contexts
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const orig = btnCopyNames.textContent;
        btnCopyNames.textContent = '✅ Copied!';
        setTimeout(() => { btnCopyNames.textContent = orig; }, 1500);
      });
    });

    // Start
    connect();

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
