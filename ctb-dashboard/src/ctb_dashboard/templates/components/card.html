<!--
  Alpine card: 3-level progressive disclosure
  Props (x-data): title, l1_context, l1_choices, l1_signals, l2_evidence, actions, badges, variant
  variant: '' (default) | 'notification-failed'
-->
<div
  x-data="{
    title: title || '',
    l1_context: l1_context || '',
    l1_choices: l1_choices || '',
    l1_signals: l1_signals || '',
    l2_evidence: l2_evidence || '',
    actions: actions || [],
    badges: badges || [],
    variant: variant || '',
    l1Open: false,
    l2Open: false,
    toggleL1() { this.l1Open = !this.l1Open; if (!this.l1Open) this.l2Open = false; },
    toggleL2() { this.l2Open = !this.l2Open; }
  }"
  :class="{
    'border-amber-500/60': variant === 'notification-failed'
  }"
  class="relative overflow-hidden rounded-2xl border border-white/10 bg-gradient-to-br from-white/5 to-transparent"
  style="background: linear-gradient(145deg, rgba(255,255,255,0.035) 0%, transparent 60%), #1c1628; box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.04) inset;"
>
  <!-- notification-failed amber left stripe -->
  <div
    x-show="variant === 'notification-failed'"
    class="absolute left-0 top-0 bottom-0 w-1 bg-amber-500/70 rounded-l-2xl"
    aria-hidden="true"
  ></div>

  <!-- L0: Header — always visible, click toggles L1 -->
  <button
    @click="toggleL1()"
    class="w-full text-left px-4 py-3 flex items-start justify-between gap-3 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 rounded-2xl"
    :aria-expanded="l1Open"
    aria-controls="card-l1"
  >
    <span class="flex items-center gap-2 flex-wrap min-w-0">
      <!-- notification-failed warning icon -->
      <span x-show="variant === 'notification-failed'" class="text-amber-400 text-sm flex-shrink-0" aria-label="notification failed">&#9888;</span>
      <span class="font-mono text-sm font-medium text-white/90 truncate" x-text="title"></span>
      <!-- badges -->
      <template x-for="(badge, i) in badges" :key="i">
        <span
          :class="{
            'bg-blue-500/20 border-blue-400/40 text-blue-300':  badge.color === 'blue',
            'bg-amber-500/20 border-amber-400/40 text-amber-300': badge.color === 'amber',
            'bg-red-500/20 border-red-400/40 text-red-300':   badge.color === 'red',
            'bg-green-500/20 border-green-400/40 text-green-300': badge.color === 'green'
          }"
          class="inline-flex items-center px-2 py-0.5 rounded-full border text-xs font-semibold flex-shrink-0"
          x-text="badge.text"
        ></span>
      </template>
    </span>
    <!-- chevron indicator -->
    <span
      class="text-white/40 text-xs flex-shrink-0 transition-transform duration-200 mt-0.5"
      :class="{ 'rotate-180': l1Open }"
      aria-hidden="true"
    >&#9660;</span>
  </button>

  <!-- L1: Context / Choices / Signals -->
  <div
    x-show="l1Open"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0 -translate-y-1"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-1"
    id="card-l1"
    class="px-4 pb-3 space-y-2 border-t border-white/5"
  >
    <!-- Context slot -->
    <div x-show="l1_context" class="pt-2">
      <p class="text-xs font-semibold text-white/40 uppercase tracking-widest mb-1">Context</p>
      <p class="text-sm text-white/75 leading-snug" x-text="l1_context"></p>
    </div>

    <!-- Choices slot -->
    <div x-show="l1_choices">
      <p class="text-xs font-semibold text-white/40 uppercase tracking-widest mb-1">Choices</p>
      <p class="text-sm text-white/75 leading-snug" x-text="l1_choices"></p>
    </div>

    <!-- Signals slot -->
    <div x-show="l1_signals">
      <p class="text-xs font-semibold text-white/40 uppercase tracking-widest mb-1">Signals</p>
      <p class="text-sm text-white/75 leading-snug" x-text="l1_signals"></p>
    </div>

    <!-- L2 toggle button (only when evidence exists) -->
    <div x-show="l2_evidence" class="pt-1">
      <button
        @click.stop="toggleL2()"
        class="text-xs text-white/40 hover:text-white/70 underline underline-offset-2 transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 rounded"
        :aria-expanded="l2Open"
        aria-controls="card-l2"
        x-text="l2Open ? '▲ Hide evidence' : '▼ Show evidence'"
      ></button>
    </div>

    <!-- L2: Evidence detail -->
    <div
      x-show="l2Open && l2_evidence"
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-100"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      id="card-l2"
      class="rounded-lg border border-white/8 bg-white/3 px-3 py-2"
    >
      <p class="text-xs font-semibold text-white/40 uppercase tracking-widest mb-1">Evidence</p>
      <p class="text-xs text-white/60 leading-relaxed font-mono whitespace-pre-wrap" x-text="l2_evidence"></p>
    </div>

    <!-- Actions -->
    <div x-show="actions && actions.length > 0" class="flex flex-wrap gap-2 pt-1">
      <template x-for="(action, i) in actions" :key="i">
        <button
          @click.stop="action.handler && action.handler()"
          :class="{
            'bg-indigo-600 hover:bg-indigo-500 text-white border-transparent': action.variant !== 'secondary',
            'bg-white/5 hover:bg-white/10 text-white/70 border-white/15': action.variant === 'secondary'
          }"
          class="px-3 py-1 rounded-lg border text-xs font-medium transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30"
          x-text="action.label"
        ></button>
      </template>
    </div>
  </div>
</div>
