<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PI Review Gate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-2">PI Review Gate</h1>
    <p class="text-gray-400 mb-8">Reviewer: <span class="font-mono text-blue-400">{{ reviewer_id }}</span></p>

    {% if tickets %}
      <div class="space-y-4">
        {% for ticket in tickets %}
        <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
          <div class="font-mono text-sm text-yellow-400 mb-1">{{ ticket.id }}</div>
          <div class="text-gray-300 text-sm capitalize">{{ ticket.review_state }}</div>
          {% if ticket.updated_at %}
          <div class="mt-1 text-xs text-gray-500">Updated: {{ ticket.updated_at }}</div>
          {% endif %}
          <div class="mt-4 flex gap-3">
            <form method="post" action="/review/approve">
              <input type="hidden" name="ticket_id" value="{{ ticket.id }}">
              <button type="submit"
                class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded text-sm font-medium transition-colors">
                Approve
              </button>
            </form>
            <form method="post" action="/review/reject">
              <input type="hidden" name="ticket_id" value="{{ ticket.id }}">
              <button type="submit"
                class="bg-red-700 hover:bg-red-600 px-4 py-2 rounded text-sm font-medium transition-colors">
                Reject
              </button>
            </form>
          </div>
        </div>
        {% endfor %}
      </div>
    {% else %}
      <div class="bg-gray-800 rounded-lg p-8 text-center border border-gray-700">
        <p class="text-gray-400">No tickets awaiting PI review.</p>
      </div>
    {% endif %}
  </div>
</body>
</html>
