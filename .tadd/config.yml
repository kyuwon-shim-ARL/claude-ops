# TADD Enforcement Configuration
version: 29.0
created: 2025-09-04
project: 

rules:
  test_first: true
  mock_limit: 20  # Maximum 20% mock usage
  coverage_min: 11  # TODO: 목표 70%, 달성 예정 2026-06-01 (현재 실측 11%, 임시 하한)
  
exceptions:
  - path: "legacy/*"
    reason: "Legacy code - gradual improvement"
  - path: "vendor/*"
    reason: "Third-party code"
  - path: "node_modules/*"
    reason: "Dependencies"

notifications:
  enabled: false
